<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <style>
        :root {
            --primary-color: #1976d2;
            --primary-light: #2196f3;
            --secondary-color: #29b6f6;
            --accent-color: #1565c0;
            --text-primary: #333;
            --text-secondary: #666;
            --card-bg: rgba(255, 255, 255, 0.98);
            --bg-gradient-start: #e0f7fa;
            --bg-gradient-end: #bbdefb;
            --border-radius: 20px;
        }

        [data-theme="dark"] {
            --primary-color: #bbdefb;
            --text-primary: #eee;
            --text-secondary: #aaa;
            --card-bg: rgba(25, 25, 35, 0.95);
            --bg-gradient-start: #0a1929;
            --bg-gradient-end: #102a43;
        }

        html { font-size: 13px; scroll-behavior: smooth; }
        @media (max-width: 480px) { html { font-size: 12px; } }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            margin: 0; padding: 15px; min-height: 100vh;
        }

        .container { max-width: 450px; margin: 0 auto; }
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--card-bg); display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px; border: 3px solid var(--secondary-color); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .title { font-size: 1.6rem; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 0.9rem; text-align: center; color: var(--text-secondary); margin-bottom: 20px; }

        .action-btn {
            display: block; width: 100%; padding: 14px; margin-bottom: 15px;
            background: var(--primary-color); color: white; border: none;
            border-radius: 30px; font-weight: bold; text-align: center; text-decoration: none;
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.97); }

        .quick-links { display: flex; justify-content: space-around; margin-top: 20px; }
        .quick-link { text-align: center; color: var(--text-secondary); text-decoration: none; font-size: 0.8rem; }
        .quick-link i { display: block; font-size: 1.4rem; margin-bottom: 5px; color: var(--primary-color); }
    </style>
</head>
<body>

    <div class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-adjust"></i>
    </div>

    <div class="container">
        <div class="card">
            <div class="avatar"><img src="https://avatars.githubusercontent.com/u/190176824" alt="avatar"></div>
            <h1 class="title">lhy - Telegram官方账号</h1>
            <p class="subtitle">Telegram专业服务商 · 一手号源</p>

            <a href="https://new.818fka.com/shop/lhy" class="action-btn">进入官方818卡网</a>
            <a href="https://why666x.github.io" class="action-btn" style="background:#4caf50">官方教程文档</a>

            <div class="quick-links">
                <a href="https://t.me/LHYXW" class="quick-link"><i class="fab fa-telegram"></i>频道</a>
                <a href="https://t.me/LHYID" class="quick-link"><i class="fas fa-headset"></i>客服</a>
                <a href="#" onclick="alert('链接已复制')" class="quick-link"><i class="fas fa-share-alt"></i>分享</a>
            </div>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
</body>
</html>
